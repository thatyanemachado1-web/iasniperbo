name = "sniperbo-telegram-engine"
main = "src/index.js"
compatibility_date = "2026-06-24"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = false

[vars]
ALLOWED_ORIGIN = "https://sniperbo.com"

[[durable_objects.bindings]]
name = "TELEGRAM_ENGINE"
class_name = "TelegramEngine"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["TelegramEngine"]
[triggers]
crons = ["0 3 * * *"]